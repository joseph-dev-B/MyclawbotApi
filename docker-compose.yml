version: '3.8'

services:
  duckduckgo-proxy:
    build: .
    container_name: duckduckgo-ai-proxy
    ports:
      - "8000:8000"
    environment:
      - DUCKDUCKGO_API_KEY=${DUCKDUCKGO_API_KEY:-sk-duckduckgo-default-key-change-me}
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    volumes:
      - ./logs:/app/logs
    networks:
      - duckduckgo-network

networks:
  duckduckgo-network:
    driver: bridge
